<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Care Clock">
<title>Care Clock</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:#1D9E75; --green-l:#EAF3DE; --green-d:#0F6E56; --green-t:#3B6D11;
  --red:#E24B4A; --red-l:#FCEBEB; --red-t:#A32D2D;
  --amber:#EF9F27; --amber-l:#FAEEDA; --amber-t:#854F0B;
  --blue:#378ADD; --blue-l:#E6F1FB; --blue-t:#185FA5;
  --bg:#f5f5f3; --card:#fff; --bdr:rgba(0,0,0,.1); --bdr2:rgba(0,0,0,.2);
  --tx:#1a1a1a; --tx2:#555; --tx3:#999;
  --r:12px; --rs:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111; --card:#1e1e1e; --bdr:rgba(255,255,255,.1); --bdr2:rgba(255,255,255,.2);
    --tx:#f0f0f0; --tx2:#aaa; --tx3:#666;
    --green-l:#0a2e1e; --green-t:#5DCAA5;
    --red-l:#2e0a0a; --red-t:#F09595;
    --amber-l:#2e1e00; --amber-t:#FAC775;
    --blue-l:#0a1e2e; --blue-t:#85B7EB;
  }
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{padding-bottom:env(safe-area-inset-bottom);}
#app{max-width:480px;margin:0 auto;padding:1rem;min-height:100vh;}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);margin-bottom:.75rem;}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.av{width:42px;height:42px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--green-t);flex-shrink:0;}
.tabs{display:flex;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);padding:3px;margin-bottom:1rem;gap:2px;}
.tab{flex:1;padding:7px 4px;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;border:none;background:transparent;color:var(--tx2);}
.tab.on{background:var(--bg);color:var(--tx);font-weight:700;}
.tbig{font-size:44px;font-weight:300;color:var(--tx);letter-spacing:-2px;text-align:center;margin:.5rem 0;font-variant-numeric:tabular-nums;}
.dsm{font-size:14px;color:var(--tx2);text-align:center;}
.eld{font-size:16px;font-weight:700;color:var(--green);text-align:center;margin-top:4px;font-variant-numeric:tabular-nums;}
.bdg{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;}
.bdg-in{background:var(--green-l);color:var(--green-t);}
.bdg-out{background:var(--red-l);color:var(--red-t);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--green);animation:pulse 1.5s infinite;}
.dr{background:var(--red);}
.da{background:var(--amber);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.geo{font-size:13px;padding:10px 12px;border-radius:var(--rs);margin-bottom:.75rem;display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
.g-ok{background:var(--green-l);color:var(--green-t);}
.g-fail{background:var(--red-l);color:var(--red-t);}
.g-neu{background:var(--amber-l);color:var(--amber-t);}
.btn{width:100%;padding:13px;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.bg{background:var(--green);color:#fff;}.bg:hover{opacity:.9;}
.br{background:var(--red);color:#fff;}.br:hover{opacity:.9;}
.bo{background:transparent;border:1px solid var(--bdr2);color:var(--tx);}
.bo:hover{background:var(--bg);}
.btn:disabled{background:var(--bdr);color:var(--tx3);cursor:not-allowed;transform:none;}
.bsm{padding:7px 14px;font-size:13px;font-weight:500;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--tx2);}
.bdel{background:transparent;border:1px solid rgba(226,75,74,.3);color:var(--red-t);width:100%;padding:11px;border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;}
.fld{margin-bottom:.875rem;}
.fld label{display:block;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:5px;}
.fld input{width:100%;padding:10px 12px;font-size:15px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--card);color:var(--tx);outline:none;transition:border .15s;}
.fld input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,.15);}
.fld input::placeholder{color:var(--tx3);}
.hint{font-size:12px;color:var(--tx3);margin-top:5px;line-height:1.4;}
.div{height:1px;background:var(--bdr);margin:.875rem 0;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.met{background:var(--bg);border-radius:var(--rs);padding:.875rem;}
.ml{font-size:11px;color:var(--tx3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.mv{font-size:22px;font-weight:700;color:var(--tx);}
.lrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);}
.lrow:last-child{border-bottom:none;}
.ll{font-size:14px;color:var(--tx2);}
.lv{font-size:14px;font-weight:600;color:var(--green);}
.trow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;}
.stbl{width:100%;border-collapse:collapse;font-size:13px;}
.stbl th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--bdr);font-weight:600;color:var(--tx3);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.stbl td{padding:10px 6px;border-bottom:1px solid var(--bdr);color:var(--tx);}
.stbl tr:last-child td{border-bottom:none;}
.wdl{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin:.75rem 0 4px;}
.noti{font-size:12px;color:var(--tx3);text-align:center;margin-top:.5rem;line-height:1.4;}
.emp{font-size:14px;color:var(--tx3);text-align:center;padding:2rem 1rem;}
.smsg{font-size:13px;min-height:20px;margin-bottom:.75rem;line-height:1.5;}
.mok{color:var(--green-t);} .merr{color:var(--red-t);} .mneu{color:var(--tx3);}
.sscr{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--bdr);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg)}}
/* Admin panel styles */
.admin-lock{position:absolute;top:1rem;right:1rem;background:transparent;border:none;cursor:pointer;color:var(--tx3);font-size:20px;padding:4px;}
.admin-overlay{background:rgba(0,0,0,.5);position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
.admin-modal{background:var(--card);border-radius:var(--r);padding:1.5rem;width:100%;max-width:400px;}
.admin-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--blue-l);color:var(--blue-t);margin-bottom:1rem;}
.coord-display{background:var(--bg);border-radius:var(--rs);padding:.75rem;font-size:12px;color:var(--tx2);font-variant-numeric:tabular-nums;margin-bottom:.75rem;line-height:1.6;}
.coord-display strong{color:var(--tx);display:block;margin-bottom:2px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const KEY='care_clock_v6';
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{config:null,sessions:[]};}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}

let data=load();
let S={
  view:data.config?'main':'admin_setup',
  tab:'clock',
  in:false,inTime:null,
  locOk:false,locChecked:false,locDist:null,locErr:null,
  timer:null,
  showAdmin:false,
  adminAuth:false,
  adminPinning:false
};

const ADMIN_PASS='admin1234'; // Default admin password - change in admin panel
const MAX_DIST_FT=100; // 100 feet radius

const $=id=>document.getElementById(id);
function toRad(v){return v*Math.PI/180;}
function distFt(a,b,c,d){const R=3958.8,dL=toRad(c-a),dO=toRad(d-b),x=Math.sin(dL/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*5280;}
function fT(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function fT2(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
function fD(ts){return new Date(ts).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function fDs(ts){return new Date(ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fEl(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}
function fHM(ms){const t=Math.floor(ms/60000),h=Math.floor(t/60),m=t%60;return`${h}h ${m}m`;}
function ini(n){return(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function todayS(){const t=new Date().toDateString();return data.sessions.filter(s=>new Date(s.inTime).toDateString()===t);}
function weekS(){const now=new Date(),d=now.getDay(),st=new Date(now);st.setDate(now.getDate()-d);st.setHours(0,0,0,0);return data.sessions.filter(s=>new Date(s.inTime)>=st);}
function totMs(arr){return arr.reduce((s,x)=>s+(x.outTime-x.inTime),0);}
function setMsg(id,html,cls){const e=$(id);if(e){e.className='smsg '+cls;e.innerHTML=html;}}

function render(){
  const app=$('app');app.innerHTML='';clearInterval(S.timer);
  if(S.view==='admin_setup'){app.appendChild(bAdminSetup());return;}
  if(S.showAdmin){app.appendChild(bAdminOverlay());}
  app.appendChild(bHeader());
  app.appendChild(bTabs());
  if(S.tab==='clock'){app.appendChild(bClock());startTick();}
  else if(S.tab==='log')app.appendChild(bLog());
  else if(S.tab==='sheet')app.appendChild(bSheet());
}

/* ── ADMIN SETUP (first time) ── */
function bAdminSetup(){
  const w=document.createElement('div');w.style.padding='1.5rem 0';
  w.innerHTML=`
  <div class="card">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="width:60px;height:60px;border-radius:50%;background:var(--blue-l);display:flex;align-items:center;justify-content:center;margin:0 auto .875rem;font-size:26px">&#128274;</div>
      <div style="font-size:22px;font-weight:700;color:var(--tx)">Supervisor Setup</div>
      <div style="font-size:14px;color:var(--tx2);margin-top:4px">Configure Care Clock for your caregiver</div>
    </div>
    <div class="admin-badge">&#128274; Supervisor only</div>
    <div class="fld"><label>Family / Client name</label><input id="af" placeholder="e.g. Brukeyey Family" autocomplete="off"></div>
    <div class="fld"><label>Caregiver name</label><input id="ac" placeholder="e.g. Edwinia Roberson" autocomplete="off"></div>
    <div class="fld"><label>Care address (for display)</label><input id="aa" placeholder="9304 Forest Lane, Dallas, TX 75243" autocomplete="off"></div>
    <div class="fld"><label>Supervisor password</label><input id="ap" type="password" placeholder="Set a password to protect settings" autocomplete="off"><div class="hint">You will need this to access supervisor settings later. Default is: admin1234</div></div>
    <div class="div"></div>
    <div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:.75rem">Pin the care location</div>
    <div style="font-size:13px;color:var(--tx2);margin-bottom:.875rem;line-height:1.6;">Go to the care home address and tap the button below to save its exact GPS location. The caregiver must be within <strong>100 ft</strong> of this location to clock in.</div>
    <div style="background:var(--bg);border:1px dashed var(--bdr2);border-radius:var(--rs);padding:1rem;margin-bottom:.75rem;text-align:center;">
      <button class="btn bo" id="apin-btn" onclick="adminPin()" style="margin-bottom:8px">&#x1F4CD; Pin care location now</button>
      <div id="apin-status" style="font-size:12px;min-height:18px;font-variant-numeric:tabular-nums;"></div>
    </div>
    <div id="as-msg" class="smsg mneu"></div>
    <button class="btn bg" id="as-save" onclick="adminSave()">Save &amp; launch app</button>
  </div>`;
  return w;
}

/* ── ADMIN OVERLAY (password protected) ── */
function bAdminOverlay(){
  const cfg=data.config||{};
  const w=document.createElement('div');
  w.className='admin-overlay';
  w.onclick=e=>{if(e.target===w){S.showAdmin=false;S.adminAuth=false;render();}};

  if(!S.adminAuth){
    w.innerHTML=`<div class="admin-modal">
      <div style="font-size:18px;font-weight:700;color:var(--tx);margin-bottom:4px">Supervisor access</div>
      <div style="font-size:13px;color:var(--tx2);margin-bottom:1rem">Enter your supervisor password to continue.</div>
      <div class="fld"><label>Password</label><input id="adm-pw" type="password" placeholder="Enter password" autocomplete="off"></div>
      <div id="adm-msg" class="smsg merr" style="min-height:16px"></div>
      <button class="btn bg" onclick="checkAdminPass()">Unlock</button>
      <button class="btn bo" style="margin-top:.5rem" onclick="closeAdmin()">Cancel</button>
    </div>`;
  } else {
    w.innerHTML=`<div class="admin-modal" style="max-height:90vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div>
          <div class="admin-badge">&#128274; Supervisor panel</div>
          <div style="font-size:18px;font-weight:700;color:var(--tx)">Settings</div>
        </div>
        <button style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--tx3)" onclick="closeAdmin()">&#x2715;</button>
      </div>
      <div class="fld"><label>Family / Client name</label><input id="cfg-f" value="${cfg.familyName||''}" autocomplete="off"></div>
      <div class="fld"><label>Caregiver name</label><input id="cfg-c" value="${cfg.caregiverName||''}" autocomplete="off"></div>
      <div class="fld"><label>Care address (display)</label><input id="cfg-a" value="${cfg.address||''}" autocomplete="off"></div>
      <div class="fld"><label>New supervisor password</label><input id="cfg-p" type="password" placeholder="Leave blank to keep current" autocomplete="off"></div>
      <div class="div"></div>
      <div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:.5rem">Care location (GPS)</div>
      <div class="coord-display">
        <strong>Current pinned location</strong>
        ${cfg.lat ? `Lat: ${cfg.lat.toFixed(6)}<br>Lng: ${cfg.lng.toFixed(6)}<br>Radius: 100 ft` : 'No location pinned yet'}
      </div>
      <button class="btn bo" id="repin-btn" onclick="adminRepin()" style="margin-bottom:.75rem">&#x1F4CD; Re-pin care location</button>
      <div id="repin-status" style="font-size:12px;min-height:16px;margin-bottom:.75rem;font-variant-numeric:tabular-nums;color:var(--green-t)"></div>
      <div id="cfg-msg" class="smsg mneu"></div>
      <button class="btn bg" style="margin-bottom:.5rem" onclick="adminUpdate()">Save changes</button>
      <div class="div"></div>
      <button class="bdel" onclick="adminClearSessions()">Clear all shift data</button>
    </div>`;
  }
  return w;
}

/* ── MAIN HEADER ── */
function bHeader(){
  const cfg=data.config||{};
  const d=document.createElement('div');d.className='hrow';d.style.position='relative';
  d.innerHTML=`
    <div>
      <div style="font-size:20px;font-weight:700;color:var(--tx)">${cfg.familyName||'Care Clock'}</div>
      <div style="font-size:13px;color:var(--tx2);margin-top:2px">${cfg.caregiverName||'Caregiver'}</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="admin-lock" onclick="openAdmin()" title="Supervisor access" style="position:static">&#9881;&#65039;</button>
      <div class="av">${ini(cfg.caregiverName)}</div>
    </div>`;
  return d;
}

/* ── TABS ── */
function bTabs(){
  const row=document.createElement('div');row.className='tabs';
  [['clock','Clock'],['log','Today'],['sheet','Timesheet']].forEach(([id,lbl])=>{
    const b=document.createElement('button');b.className='tab'+(S.tab===id?' on':'');b.textContent=lbl;b.onclick=()=>{S.tab=id;render();};row.appendChild(b);
  });
  return row;
}

/* ── CLOCK TAB ── */
function bClock(){
  const elapsed=S.in&&S.inTime?Date.now()-S.inTime:0;
  let gHtml='';
  if(!S.locChecked){
    gHtml=`<div class="geo g-neu"><div class="dot da" style="margin-top:3px;flex-shrink:0"></div><span>Tap below to verify your location</span></div>`;
  } else if(S.locOk){
    gHtml=`<div class="geo g-ok"><div class="dot dg" style="margin-top:3px;flex-shrink:0"></div><span>You are within range &mdash; ${Math.round(S.locDist)} ft from the care address</span></div>`;
  } else {
    const msg=S.locDist!==null
      ?`You are too far away &mdash; ${Math.round(S.locDist)} ft from the care address. You must be within 100 ft to clock in. Please go to the care location.`
      :(S.locErr||'Could not get your location. Please try again.');
    gHtml=`<div class="geo g-fail"><div class="dot dr" style="margin-top:3px;flex-shrink:0"></div><span>${msg}</span></div>`;
  }
  const badge=S.in?`<div class="bdg bdg-in"><div class="dot dg"></div>Clocked in</div>`:`<div class="bdg bdg-out"><div class="dot dr"></div>Clocked out</div>`;
  const mainBtn=S.in
    ?`<button class="btn br" onclick="doClock()">Clock out</button>`
    :S.locOk
      ?`<button class="btn bg" onclick="doClock()">Clock in</button>`
      :`<button class="btn" disabled>You must be within 100 ft to clock in</button>`;
  const w=document.createElement('div');
  w.innerHTML=`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      ${badge}
      <div class="eld" id="eld" style="${S.in?'':'display:none'}">${fEl(elapsed)}</div>
    </div>
    <div class="tbig" id="cf">${fT(Date.now())}</div>
    <div class="dsm">${fD(Date.now())}</div>
    <div class="div"></div>
    ${gHtml}
    <button class="btn bo" style="margin-bottom:.75rem" id="geo-btn" onclick="checkGeo()">&#x1F4CD; Verify my location</button>
    ${mainBtn}
    <div class="noti">You must be within 100 ft of ${data.config?.address||'the care address'}</div>
  </div>
  <div class="card">
    <div class="lbl">Today at a glance</div>
    <div class="mgrid">
      <div class="met"><div class="ml">Shifts today</div><div class="mv">${todayS().length}</div></div>
      <div class="met"><div class="ml">Hours today</div><div class="mv">${fHM(totMs(todayS()))}</div></div>
    </div>
  </div>`;
  return w;
}

/* ── LOG TAB ── */
function bLog(){
  const sess=todayS(),total=totMs(sess);
  const tRows=sess.length?sess.map((s,i)=>`<div class="lrow"><span class="ll">Shift ${i+1} &nbsp; ${fT2(s.inTime)} &ndash; ${fT2(s.outTime)}</span><span class="lv">${fHM(s.outTime-s.inTime)}</span></div>`).join(''):`<div class="emp">No shifts recorded today</div>`;
  const totHtml=sess.length?`<div class="div"></div><div class="trow"><span style="font-size:14px;font-weight:600;color:var(--tx2)">Total today</span><span style="font-size:16px;font-weight:700;color:var(--tx)">${fHM(total)}</span></div>`:'';
  const week=weekS(),wt=totMs(week),gr={};
  week.forEach(s=>{const d=fDs(s.inTime);(gr[d]=gr[d]||[]).push(s);});
  const wHtml=week.length?Object.entries(gr).map(([day,ss])=>`<div class="wdl">${day}</div>${ss.map((s,i)=>`<div class="lrow"><span class="ll">Shift ${i+1} &nbsp; ${fT2(s.inTime)} &ndash; ${fT2(s.outTime)}</span><span class="lv">${fHM(s.outTime-s.inTime)}</span></div>`).join('')}`).join(''):`<div class="emp">No shifts this week</div>`;
  const w=document.createElement('div');
  w.innerHTML=`
  <div class="card"><div class="lbl">Today's log</div>${tRows}${totHtml}</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      <div class="lbl" style="margin:0">This week</div>
      <span style="font-size:14px;font-weight:700;color:var(--green)">${fHM(wt)}</span>
    </div>
    ${wHtml}
  </div>`;
  return w;
}

/* ── SHEET TAB ── */
function bSheet(){
  const sess=data.sessions.slice().reverse(),total=totMs(data.sessions);
  const rows=sess.length?sess.map(s=>`<tr><td>${fDs(s.inTime)}</td><td>${fT2(s.inTime)}</td><td>${fT2(s.outTime)}</td><td style="font-weight:700;color:var(--green)">${fHM(s.outTime-s.inTime)}</td></tr>`).join(''):`<tr><td colspan="4" style="text-align:center;color:var(--tx3);padding:2rem">No sessions yet</td></tr>`;
  const w=document.createElement('div');
  w.innerHTML=`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
      <div class="lbl" style="margin:0">All shifts</div>
      <button class="bsm" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="sscr">
      <table class="stbl">
        <thead><tr><th>Date</th><th>In</th><th>Out</th><th>Hours</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${sess.length?`<div class="div"></div><div class="trow"><span style="font-size:14px;font-weight:600;color:var(--tx2)">All-time total</span><span style="font-size:16px;font-weight:700;color:var(--tx)">${fHM(total)}</span></div>`:''}
  </div>`;
  return w;
}

/* ── TICK ── */
function startTick(){
  S.timer=setInterval(()=>{
    const cf=$('cf');if(cf)cf.textContent=fT(Date.now());
    const ed=$('eld');if(ed&&S.in&&S.inTime)ed.textContent=fEl(Date.now()-S.inTime);
  },1000);
}

/* ── ADMIN FUNCTIONS ── */
function openAdmin(){S.showAdmin=true;S.adminAuth=false;render();}
function closeAdmin(){S.showAdmin=false;S.adminAuth=false;render();}

function checkAdminPass(){
  const pw=$('adm-pw').value;
  const stored=data.config?.adminPass||ADMIN_PASS;
  if(pw===stored){S.adminAuth=true;render();}
  else{const m=$('adm-msg');if(m){m.textContent='Incorrect password. Try again.';}}
}

function adminPin(){
  const btn=$('apin-btn'),st=$('apin-status');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Getting GPS...';}
  if(st){st.style.color='var(--tx3)';st.textContent='Locating...';}
  if(!navigator.geolocation){
    if(st){st.style.color='var(--red-t)';st.textContent='Geolocation not supported.';}
    if(btn){btn.disabled=false;btn.innerHTML='&#x1F4CD; Pin care location now';}
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    window._adminPinLat=pos.coords.latitude;
    window._adminPinLng=pos.coords.longitude;
    if(st){st.style.color='var(--green-t)';st.textContent=`Pinned: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;}
    if(btn){btn.disabled=false;btn.innerHTML='&#x2713; Location pinned! Tap again to update';}
  },err=>{
    const msg=err.code===1?'Permission denied. Allow location access.':'Could not get location. Try again.';
    if(st){st.style.color='var(--red-t)';st.textContent=msg;}
    if(btn){btn.disabled=false;btn.innerHTML='&#x1F4CD; Pin care location now';}
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

function adminRepin(){
  const btn=$('repin-btn'),st=$('repin-status');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Getting GPS...';}
  navigator.geolocation.getCurrentPosition(pos=>{
    if(data.config){data.config.lat=pos.coords.latitude;data.config.lng=pos.coords.longitude;save(data);}
    S.locChecked=false;S.locOk=false;
    if(st){st.textContent=`Updated: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;}
    if(btn){btn.disabled=false;btn.innerHTML='&#x2713; Re-pinned! Tap again to update';}
  },err=>{
    if(st){st.style.color='var(--red-t)';st.textContent=err.code===1?'Permission denied.':'Could not get location.';}
    if(btn){btn.disabled=false;btn.innerHTML='&#x1F4CD; Re-pin care location';}
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

function adminSave(){
  const f=$('af').value.trim(),c=$('ac').value.trim(),a=$('aa').value.trim(),p=$('ap').value.trim();
  if(!f||!c||!a){setMsg('as-msg','Please fill in all fields.','merr');return;}
  if(!window._adminPinLat){setMsg('as-msg','Please pin the care location first.','merr');return;}
  data.config={
    familyName:f,caregiverName:c,address:a,
    lat:window._adminPinLat,lng:window._adminPinLng,
    adminPass:p||ADMIN_PASS
  };
  save(data);S.view='main';S.tab='clock';render();
}

function adminUpdate(){
  const f=$('cfg-f').value.trim(),c=$('cfg-c').value.trim(),a=$('cfg-a').value.trim(),p=$('cfg-p').value.trim();
  if(!f||!c||!a){setMsg('cfg-msg','Please fill in all fields.','merr');return;}
  data.config={...data.config,familyName:f,caregiverName:c,address:a};
  if(p)data.config.adminPass=p;
  save(data);
  S.locChecked=false;S.locOk=false;
  setMsg('cfg-msg','Saved!','mok');
  setTimeout(()=>{closeAdmin();},800);
}

function adminClearSessions(){
  if(!confirm('Delete ALL shift records? This cannot be undone.'))return;
  data.sessions=[];save(data);
  setMsg('cfg-msg','All shift data cleared.','mok');
  setTimeout(()=>{closeAdmin();},800);
}

/* ── GEOLOCATION CHECK ── */
function checkGeo(){
  const btn=$('geo-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Getting location...';}
  if(!navigator.geolocation){S.locChecked=true;S.locOk=false;S.locErr='Geolocation not supported on this device.';render();return;}
  if(!data.config?.lat){S.locChecked=true;S.locOk=false;S.locErr='No care location set. Contact your supervisor.';render();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const d=distFt(pos.coords.latitude,pos.coords.longitude,data.config.lat,data.config.lng);
      S.locChecked=true;S.locDist=d;S.locOk=d<=MAX_DIST_FT;S.locErr=null;
      render();
    },
    err=>{
      S.locChecked=true;S.locOk=false;S.locDist=null;
      S.locErr=err.code===1?'Location permission denied. Please allow location access in your browser settings.':'Could not get your location. Please try again.';
      render();
    },
    {enableHighAccuracy:true,timeout:12000,maximumAge:30000}
  );
}

/* ── CLOCK IN / OUT ── */
function doClock(){
  if(S.in){data.sessions.push({inTime:S.inTime,outTime:Date.now()});save(data);S.in=false;S.inTime=null;}
  else{S.in=true;S.inTime=Date.now();}
  render();
}

/* ── EXPORT CSV ── */
function exportCSV(){
  const hdr=['Date','Clock In','Clock Out','Duration (hrs)','Duration (min)'];
  const rows=data.sessions.map(s=>{const ms=s.outTime-s.inTime;return[fDs(s.inTime),fT2(s.inTime),fT2(s.outTime),(ms/3600000).toFixed(2),Math.round(ms/60000)];});
  const csv=[hdr,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${(data.config?.caregiverName||'caregiver').replace(/\s+/g,'_')}_timesheet.csv`;a.click();URL.revokeObjectURL(url);
}

render();
</script>
